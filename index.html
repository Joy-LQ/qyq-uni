<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情缘签 · 通用版</title>
<style>
  :root {
    --bg: #1A0A0D;
    --velvet: #7A1F2B;
    --gold: #C9A15A;
    --gold-light: #E8D5A8;
    --card-back: #4A0E17;
    --card-face: #F2E8D5;
    --ink: #2B1A14;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: radial-gradient(ellipse at 50% 30%, #2A1015 0%, var(--bg) 70%);
    color: var(--gold-light);
    font-family: "Songti SC", "STSong", "SimSun", serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header { text-align: center; padding: 34px 20px 10px; }
  header h1 {
    font-size: 44px;
    letter-spacing: 18px;
    text-indent: 18px;
    color: var(--gold);
    font-weight: 600;
    text-shadow: 0 0 24px rgba(201,161,90,.35);
  }
  header .sub {
    margin-top: 10px;
    font-size: 13px;
    letter-spacing: 6px;
    color: rgba(232,213,168,.55);
  }
  .hairline {
    width: 220px; height: 1px; margin: 18px auto 0;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  #stage {
    flex: 1;
    width: 100%;
    max-width: 640px;
    padding: 18px 20px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .phase-tag {
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(232,213,168,.5);
    margin-bottom: 14px;
    min-height: 16px;
  }

  /* ── 单张大卡 ── */
  .card-wrap {
    perspective: 1200px;
    width: 260px;
    height: 380px;
    margin: 6px auto 18px;
    cursor: pointer;
  }
  .card {
    position: relative;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform .9s cubic-bezier(.4,.1,.2,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face-side {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    overflow: hidden;
  }
  .card-back {
    background:
      radial-gradient(circle at 50% 45%, rgba(201,161,90,.10), transparent 62%),
      var(--card-back);
    border: 1px solid rgba(201,161,90,.55);
    box-shadow: 0 12px 40px rgba(0,0,0,.55), inset 0 0 0 6px rgba(201,161,90,.14);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-back::before, .card-back::after {
    content: "";
    position: absolute;
    left: 14px; right: 14px;
    height: 34px;
    background-image: repeating-radial-gradient(circle at 12px 34px, transparent 0 8px, rgba(201,161,90,.4) 8px 9px, transparent 9px 16px);
    background-size: 28px 34px;
    background-repeat: repeat-x;
    opacity: .8;
  }
  .card-back::before { top: 14px; }
  .card-back::after { bottom: 14px; transform: scaleY(-1); }
  .seal {
    width: 92px; height: 92px;
    border: 2px solid var(--gold);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 52px;
    color: var(--gold);
    font-weight: 700;
    box-shadow: 0 0 30px rgba(201,161,90,.25), inset 0 0 14px rgba(201,161,90,.18);
    background: rgba(0,0,0,.18);
  }
  .card-back .hint {
    position: absolute;
    bottom: 58px; left: 0; right: 0;
    text-align: center;
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(232,213,168,.5);
  }
  .card-front {
    transform: rotateY(180deg);
    background:
      radial-gradient(circle at 30% 20%, rgba(122,31,43,.06), transparent 55%),
      var(--card-face);
    color: var(--ink);
    border: 1px solid rgba(122,31,43,.35);
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 26px 24px 20px;
  }
  .card-front .kind {
    font-size: 12px;
    letter-spacing: 5px;
    color: var(--velvet);
    border: 1px solid rgba(122,31,43,.4);
    padding: 4px 12px 3px;
    border-radius: 3px;
    margin-bottom: 20px;
  }
  .card-front.hot .kind { background: var(--velvet); color: var(--card-face); }
  .card-front .title {
    font-size: 27px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--velvet);
    text-align: center;
    line-height: 1.5;
    margin-bottom: 18px;
  }
  .card-front .divider {
    width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, #7A1F2B, transparent);
    margin-bottom: 18px;
  }
  .card-front .body {
    flex: 1;
    font-size: 15px;
    line-height: 2;
    text-align: center;
    color: #4a352b;
    display: flex;
    align-items: center;
  }
  .card-front .foot {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(122,31,43,.55);
  }

  /* ── 道具签逐张入场动画（尺寸与主卡完全一致） ── */
  .card-wrap.deal { animation: dealIn .55s ease both; }
  @keyframes dealIn {
    from { opacity: 0; transform: translateY(34px) rotate(-3deg); }
    to { opacity: 1; transform: none; }
  }

  /* ── 按钮 ── */
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-bottom: 14px;
  }
  button.gold {
    font-family: inherit;
    font-size: 15px;
    letter-spacing: 4px;
    padding: 12px 26px 11px;
    background: linear-gradient(160deg, rgba(201,161,90,.16), rgba(201,161,90,.05));
    color: var(--gold-light);
    border: 1px solid var(--gold);
    border-radius: 4px;
    cursor: pointer;
    transition: all .25s;
  }
  button.gold:hover {
    background: linear-gradient(160deg, rgba(201,161,90,.32), rgba(201,161,90,.12));
    box-shadow: 0 0 18px rgba(201,161,90,.3);
  }
  button.ghost {
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 3px;
    padding: 9px 18px 8px;
    background: transparent;
    color: rgba(232,213,168,.65);
    border: 1px solid rgba(201,161,90,.35);
    border-radius: 4px;
    cursor: pointer;
    transition: all .25s;
  }
  button.ghost:hover { color: var(--gold-light); border-color: var(--gold); }
  button:disabled { opacity: .35; cursor: default; box-shadow: none !important; }

  .note {
    font-size: 12.5px;
    letter-spacing: 2px;
    color: rgba(232,213,168,.45);
    text-align: center;
    line-height: 2;
    max-width: 440px;
  }

  .intro {
    text-align: center;
    font-size: 15px;
    line-height: 2.4;
    letter-spacing: 2px;
    color: rgba(232,213,168,.85);
    margin: 26px 0 30px;
    max-width: 440px;
  }

  .exit-scene {
    text-align: center;
    margin-top: 40px;
    animation: fadeUp 1.2s ease both;
  }
  .exit-scene .line {
    font-size: 19px;
    line-height: 2.4;
    letter-spacing: 3px;
    color: var(--gold-light);
    max-width: 400px;
    margin: 0 auto 30px;
  }
  .exit-scene .sign {
    font-size: 15px;
    letter-spacing: 5px;
    color: var(--gold);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: none; }
  }

  #memoBox {
    width: 100%;
    max-width: 440px;
    margin-top: 6px;
    display: none;
  }
  #memoBox textarea {
    width: 100%;
    min-height: 64px;
    background: rgba(242,232,213,.06);
    border: 1px solid rgba(201,161,90,.35);
    border-radius: 4px;
    color: var(--gold-light);
    font-family: inherit;
    font-size: 14px;
    line-height: 1.9;
    letter-spacing: 1px;
    padding: 10px 12px;
    resize: vertical;
  }
  #memoBox .memo-actions { text-align: right; margin-top: 8px; }

  #archivePanel, #setupPanel {
    position: fixed;
    inset: 0;
    background: rgba(10,4,5,.88);
    backdrop-filter: blur(4px);
    display: none;
    justify-content: center;
    align-items: flex-start;
    overflow-y: auto;
    padding: 50px 20px;
    z-index: 50;
  }
  #archivePanel .panel, #setupPanel .panel {
    width: 100%;
    max-width: 480px;
    background: #221014;
    border: 1px solid rgba(201,161,90,.5);
    border-radius: 10px;
    padding: 28px 26px;
  }
  #archivePanel h2, #setupPanel h2 {
    font-size: 20px;
    letter-spacing: 6px;
    color: var(--gold);
    text-align: center;
    margin-bottom: 20px;
  }
  .memo-item {
    border-left: 2px solid rgba(201,161,90,.5);
    padding: 6px 0 6px 14px;
    margin-bottom: 16px;
  }
  .memo-item .meta {
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(232,213,168,.45);
    margin-bottom: 5px;
  }
  .memo-item .text {
    font-size: 14px;
    line-height: 1.9;
    color: rgba(232,213,168,.9);
  }
  .archive-foot { text-align: center; margin-top: 20px; }
  .su-sec { margin: 16px 0; }
  .su-row { display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .su-row input {
    background: rgba(34,16,20,.6);
    border: 1px solid var(--gold);
    border-radius: 10px;
    color: var(--gold-light);
    font-family: inherit;
    font-size: 14px;
    padding: 9px 12px;
    width: 150px;
    outline: none;
  }
  .su-row input::placeholder { color: rgba(201,161,90,.45); }

  footer {
    padding: 16px 0 26px;
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(201,161,90,.5);
  }
  #toast {
    position: fixed;
    bottom: 78px; left: 50%;
    transform: translateX(-50%);
    background: rgba(34,16,20,.95);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-size: 13px;
    letter-spacing: 2px;
    padding: 9px 20px;
    border-radius: 4px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s;
    z-index: 60;
  }
  #toast.show { opacity: 1; }

  /* ═══ 美工升级 ═══ */
  /* 金粉浮尘 */
  #dust {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  header, #stage, footer { position: relative; z-index: 2; }
  /* 暗角，让视线聚向中央 */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 42%, transparent 55%, rgba(8,3,4,.55) 100%);
    z-index: 0;
  }
  /* 标题入场 + 呼吸金光 */
  header { animation: fadeUp 1.4s ease both; }
  header h1 { animation: breathe 6s ease-in-out infinite; }
  @keyframes breathe {
    0%, 100% { text-shadow: 0 0 18px rgba(201,161,90,.25); }
    50% { text-shadow: 0 0 40px rgba(201,161,90,.6), 0 0 80px rgba(201,161,90,.18); }
  }
  /* 卡牌悬停轻浮 */
  .card-wrap { transition: transform .35s ease; }
  .card-wrap:hover { transform: translateY(-8px); }
  /* 卡背旋转符环 */
  .card-back .ring {
    position: absolute;
    top: 50%; left: 50%;
    width: 150px; height: 150px;
    margin: -75px 0 0 -75px;
    border: 1px dashed rgba(201,161,90,.45);
    border-radius: 50%;
    animation: spin 26s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* 金按钮流光扫过 */
  button.gold {
    position: relative;
    overflow: hidden;
  }
  button.gold::after {
    content: "";
    position: absolute;
    top: 0; left: -80%;
    width: 50%; height: 100%;
    background: linear-gradient(105deg, transparent, rgba(232,213,168,.35), transparent);
    transform: skewX(-20deg);
    transition: left .55s ease;
  }
  button.gold:hover::after { left: 130%; }
  /* 背景乐开关 */
  #musicBtn {
    position: fixed;
    right: 18px; bottom: 18px;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    background: rgba(34,16,20,.85);
    color: var(--gold-light);
    font-size: 17px;
    cursor: pointer;
    z-index: 70;
    transition: all .3s;
    box-shadow: 0 0 14px rgba(201,161,90,.2);
  }
  #musicBtn:hover { box-shadow: 0 0 22px rgba(201,161,90,.45); }
  #musicBtn.off { opacity: .4; box-shadow: none; }
  /* 往局回顾常驻入口——任何阶段都能翻回忆 */
  #archiveBtn {
    position: fixed;
    right: 18px; bottom: 74px;
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    background: rgba(34,16,20,.85);
    color: var(--gold-light);
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    z-index: 70;
    transition: all .3s;
    box-shadow: 0 0 14px rgba(201,161,90,.2);
  }
  #archiveBtn:hover { box-shadow: 0 0 22px rgba(201,161,90,.45); }
  /* 档位与执签判定的小圆片 */
  .chip {
    border: 1px solid var(--gold);
    background: transparent;
    color: var(--gold-light);
    border-radius: 16px;
    padding: 6px 13px 5px;
    font-size: 12.5px;
    letter-spacing: 1px;
    cursor: pointer;
    font-family: inherit;
    opacity: .5;
    transition: all .25s;
  }
  .chip.on { opacity: 1; background: rgba(201,161,90,.16); box-shadow: 0 0 10px rgba(201,161,90,.25); }
  .heat-box { margin: 6px 0 16px; }
  .heat-title, .own-title { font-size: 12px; letter-spacing: 4px; color: var(--gold); opacity: .8; margin-bottom: 8px; text-align: center; }
  .own-box { margin: 16px auto 6px; max-width: 440px; }
  .own-row { display: flex; gap: 6px; align-items: center; justify-content: center; flex-wrap: wrap; margin: 7px 0; font-size: 13.5px; }
  .own-row .pname { color: var(--gold-light); }

  /* ═══ 生日扉页 ═══ */
  #birthdayCard {
    position: fixed;
    inset: 0;
    z-index: 80;
    background:
      radial-gradient(ellipse at 50% 35%, #2A1015 0%, var(--bg) 75%);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    transition: opacity 1.4s ease;
  }
  #birthdayCard.gone { opacity: 0; pointer-events: none; }
  .bc-inner {
    padding: 40px 30px;
    animation: fadeUp 1.6s ease both;
  }
  .bc-small {
    font-size: 13px;
    letter-spacing: 8px;
    color: rgba(232,213,168,.55);
    margin-bottom: 26px;
  }
  .bc-name {
    font-size: 64px;
    letter-spacing: 22px;
    text-indent: 22px;
    color: var(--gold);
    font-weight: 700;
    text-shadow: 0 0 40px rgba(201,161,90,.5);
    animation: breathe 6s ease-in-out infinite;
  }
  .bc-title {
    font-size: 22px;
    letter-spacing: 12px;
    text-indent: 12px;
    color: var(--gold-light);
    margin-top: 14px;
  }
  .bc-line {
    width: 150px; height: 1px;
    margin: 26px auto;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .bc-text {
    font-size: 15px;
    line-height: 2.3;
    letter-spacing: 2px;
    color: rgba(232,213,168,.8);
    margin-bottom: 22px;
  }
  .bc-sign {
    font-size: 13px;
    letter-spacing: 5px;
    color: var(--gold);
    margin-bottom: 34px;
  }
  @media (max-width: 520px) {
    .bc-name { font-size: 46px; letter-spacing: 16px; text-indent: 16px; }
    .bc-text { font-size: 14px; }
  }

  /* ═══ 手机排版：字大一档，整体收紧到一屏 ═══ */
  @media (max-width: 520px) {
    header { padding: 18px 16px 4px; }
    header h1 { font-size: 30px; letter-spacing: 10px; text-indent: 10px; }
    header .sub { margin-top: 6px; font-size: 11px; letter-spacing: 4px; }
    .hairline { margin: 10px auto 0; width: 170px; }
    #stage { padding: 10px 16px 16px; }
    .phase-tag { margin-bottom: 8px; }
    .card-wrap { width: 252px; height: 372px; margin: 2px auto 12px; }
    .card-front { padding: 20px 18px 16px; }
    .card-front .kind { margin-bottom: 12px; }
    .card-front .title { font-size: 25px; margin-bottom: 12px; }
    .card-front .divider { margin-bottom: 12px; }
    .card-front .body { font-size: 16px; line-height: 1.9; }
    .btn-row { gap: 10px; margin-bottom: 8px; }
    button.gold { font-size: 14.5px; padding: 10px 18px 9px; letter-spacing: 3px; }
    button.ghost { font-size: 12.5px; padding: 8px 14px 7px; }
    .note { font-size: 13px; line-height: 1.8; }
    .intro { font-size: 15px; line-height: 2.1; margin: 14px 0 18px; }
    .exit-scene { margin-top: 16px; }
    .exit-scene .line { font-size: 17px; line-height: 2.2; }
    footer { padding: 8px 0 14px; font-size: 11px; }
    #musicBtn { width: 40px; height: 40px; right: 14px; bottom: 14px; }
    #archiveBtn { width: 40px; height: 40px; right: 14px; bottom: 64px; font-size: 14px; }
    #memoBox textarea { font-size: 15px; }
    .memo-item .text { font-size: 15px; }
  }
</style>
</head>
<body>

<canvas id="dust"></canvas>

<div id="birthdayCard">
  <div class="bc-inner">
    <div class="bc-small">谨 以 此 签 筒 · 赠</div>
    <div class="bc-name">有 情 人</div>
    <div class="bc-title">共 一 局</div>
    <div class="bc-line"></div>
    <div class="bc-text">
      一百零二支签，写尽了相遇的一百零二种开场。<br>
      你们的那一种，从启签开始。<br>
      先立偏好，再问天意——雷点绕开，萌点加倍。
    </div>
    <div class="bc-sign">情 缘 签 · 通 用 版</div>
    <button class="gold" onclick="openCard()">启 签</button>
  </div>
</div>

<header>
  <h1>情 缘 签</h1>
  <div class="sub">✦ 签 落 定 情 缘 · 与 君 共 一 局 ✦</div>
  <div class="hairline"></div>
</header>

<div id="stage"></div>

<div id="archivePanel">
  <div class="panel">
    <h2>往 局 回 顾</h2>
    <div id="archiveList"></div>
    <div class="archive-foot">
      <button class="ghost" onclick="clearArchive()">焚 稿</button>
      <button class="gold" onclick="closeArchive()" style="margin-left:10px">合 卷</button>
    </div>
  </div>
</div>

<div id="setupPanel">
  <div class="panel">
    <h2>入 局 偏 好</h2>
    <div id="setupBody"></div>
    <div class="archive-foot">
      <button class="gold" onclick="saveSetup()">存 好 · 入 局</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
<button id="musicBtn" onclick="toggleMusic()" title="背景乐">♫</button>
<button id="archiveBtn" onclick="openArchive()" title="往局回顾">卷</button>

<footer>情缘签 · 愿有情人共一局</footer>

<script>
/* ═══════════ 卡库 ═══════════ */

const WORLD_CARDS = [
  { t:"追妻火葬场", b:"他曾亲手弄丢了你。这一局，从他跪着求回来开始——跪多久，你说了算。",
    s:"你是言氏集团总裁言慎之，三年前为了家族利益亲手把我推开，离婚协议是你让助理送来的。如今我是圈内炙手可热的珠宝设计师，身边从不缺人，而你悔了——追妻火葬场，现在开业。开场：今晚的行业晚宴上，你穿过半个宴会厅堵住我，三年来第一次亲自开口：「聊聊吗，前妻。」" },
  { t:"隐秘霸总", b:"顶层办公室的落地窗帘一拉，全城最有权势的男人只听你一个人的话。",
    s:"你是掌控全城商业命脉的隐形大佬，对外冷血寡言，手段狠辣，没人敢直视你的眼睛。我是三个月前入职的贴身特助，也是唯一一个敢跟你顶嘴的人——你不但没炒我，反而越来越离不开我。开场：今夜加班，顶层办公室只剩我们两个，你忽然起身拉上整面落地窗的窗帘，回头看我：「过来。」" },
  { t:"ABO 信息素", b:"命定的信息素在电梯里相撞。发情期还有三天——还是三分钟，看剧情脸色。",

function scriptFor(card) {
  if (card.kindKey === "world") {
    return `【情缘签 · 开局】\n\n` +
`──── 给${P.him}的入场须知（${P.her} 敬上）────\n` +
`这是${P.her}带来的「情缘签」，一个陪你们走剧情的抽签游戏。请你担任本局的隐形导演：\n` +
`① 本局流程：大环境签（就是这支）→ 中途 2-3 支剧情/氛围/角色签 → 一支「入幕签」把故事引向帐内 → 最后天意赐下 1-3 件道具——道具之后，可能还有一支「结局签」替终局定调。签退场后，故事全程交给你。\n` +
`② 节奏由你掌握：每支签演 5-10 轮，你觉得这一段尽兴了，就提醒${P.her}「去抽下一支签吧」——剧情签推进事件，氛围签不推进、原地把温度拧高一格，角色签放一个配角进场搅局，提醒时可顺带建议抽哪一叠，也可以让她自己挑。\n` +
`③ 抽回来的签文别生硬切换，把它当命运递来的话头，顺进正在演的剧情里。\n` +
`④ 每次提醒抽签时，顺手把刚才这一段写成一两句戏文式的高光总结，让${P.her}复制存进工具的「往局回顾」（数据只存在她自己的浏览器里，私密有保障）。\n` +
`⑤ 最重要：流程你知道就好，不许向${P.her}剧透后面有什么签——惊喜和宿命感是这个游戏的一半。\n` +
heatLine() +
darkLine() +
`（之后每支签都会随签附上简短导演注，帮你记着这些规则。）\n` +
`──────────────────────────\n\n` +
`本局大环境签——「${card.t}」。\n\n本局设定：${card.s}` + sagaLine() + `\n\n须知阅毕请入戏，` + (S && S.saga ? `这是续卷——别重演旧开场，从前情之后的新一幕起头。` : `从「开场」那一幕演起，你来起头。`);
  }
  if (card.kindKey === "turn") {
    return `【情缘签 · 入幕】\n（导演注：转折签到了。把情节自然地引向帐内，不赶时间；演到火候，提醒${P.her}回签筒「领受天意」，并附上一两句这一段的高光总结供她存档。仍然不剧透。）\n\n` +
`签文降下——「${card.t}」：${card.b}\n\n接下来的情节，请顺着这支签往下走。`;
  }
  if (card.kindKey === "prop") {
    return null; // 道具签统一复制，见 propsScript
  }
  if (card.kindKey === "endsign") {
    return `【情缘签 · 结局】\n（导演注：终局签到了。把正在演的剧情往这支签指的方向收束，写一段完整尽兴的收官戏；收完替整局写一段尾声高光，让${P.her}存进「往局回顾」。）\n\n结局签——「${card.t}」：${card.b}\n\n请照此收官。`;
  }
  const kindName = card.kindKey === "plot" ? "剧情" : card.kindKey === "char" ? "角色" : "氛围";
  return `【情缘签 · ${kindName}】\n（导演注：把这支签当命运递来的话头，自然顺进正演的剧情，别生硬切换；这一段演 5-10 轮，尽兴后提醒${P.her}「去抽下一支签吧」（可顺带建议：剧情签推事件，氛围签原地加温），并附上一两句高光总结供她存进「往局回顾」。不剧透后续。）\n\n` +
`我们抽到了一支签——「${card.t}」：${card.b}\n\n接下来的剧情照这支签走。`;
}

function sagaLine() {
  if (!S || !S.saga) return "";
  const h = (S.saga.highlights && S.saga.highlights.length)
    ? `\n前情高光：\n${S.saga.highlights.map(x => "· " + x).join("\n")}`
    : "";
  return `\n\n【续卷 · 前情提要】这个世界我们开过一卷，灯一直留着。${h}`;
}

function darkLine() {
  if (!S || !S.dark) return "";
  return `⑦ 天机（仅你可见）：下面这段密文是本局的一条暗线，base64 编码——自行解码，绝不向${P.her}透露原文，也不许承认有没有暗线。把它当伏笔悄悄埋进剧情，在中后段选一个最狠的时机揭晓：【${encodeDark(S.dark)}】\n`;
}

function heatLine() {
  if (S && S.heat === "max")
    return `⑥ 火力档位：本局开的是「火力全开」——不留白、不虚写、不切镜头；写到亲密处放慢节奏、写满细节，以感官描写为主线，不许一笔带过，尺度上限就是你所在平台的上限。\n`;
  if (S && S.heat === "raw")
    return `⑥ 火力档位：本局开的是「原义档」——写到亲密处不留白、不切镜头、不虚写，直白尽兴。\n`;
  return `⑥ 火力档位：本局开的是「帐幔档」——把人送到门口，门内留白：亲密处点到即止，靠氛围与暗示收笔。\n`;
}

function propsScript(props) {
  const judged = props.some(p => p.own);
  return `【情缘签 · 天意】\n（导演注：这是最后一签。道具怎么用、何时用、用在哪，全由你安排进剧情；${judged ? "带「执行判定」的道具写明了谁执签、谁领受，照判执行，不许翻案；没带的由剧情自定。" : ""}道具用完后剧情不落幕，继续往下带，什么时候收官、怎么收官，以你和${P.her}尽兴为准。收官时记得替这一局写个尾声高光，让${P.her}存进「往局回顾」。）\n\n` +
`这一局天意赐下${props.length}件道具：\n${props.map(p=>`「${p.t}」——${p.b}${p.own==="me"?`（执行判定：${P.her}执签，${P.him}领受）`:p.own==="him"?`（执行判定：${P.him}执签，${P.her}领受）`:""}`).join("\n")}`;
}

function suKeep() {
  const h = document.getElementById("suHer"), m = document.getElementById("suHim");
  if (h) T.her = h.value.trim();
  if (m) T.him = m.value.trim();
}
function suXp(k) { suKeep(); T.xp = k; renderSetup(); }
function suSv(k) { suKeep(); T.sv = k; renderSetup(); }
function suVeto(k) {
  suKeep();
  const i = T.veto.indexOf(k);
  if (i >= 0) T.veto.splice(i, 1); else T.veto.push(k);
  renderSetup();
}
function saveSetup() {
  suKeep();
  if (!T.her) T.her = "我";
  if (!T.him) T.him = "他";
  P = T;
  localStorage.setItem(PREF_KEY, JSON.stringify(P));
  document.getElementById("setupPanel").style.display = "none";
  toast("偏好存好了，天意按此发牌 ✧");
  renderStart();
}

function worldPool() {
  let pool = WORLD_CARDS.filter(w => !(w.veto || []).some(v => P && P.veto && P.veto.includes(v)));
  if (!pool.length) pool = WORLD_CARDS.slice();
  return pool;
}
function pickWorld() {
  const pool = worldPool();
  const weights = pool.map(w => {
    let wt = 1;
    if (P && P.xp && P.xp !== "any" && (w.xp || []).includes(P.xp)) wt *= 3;
    if (P && P.sv === "sweet" && w.angst) wt *= 0.3;
    if (P && P.sv === "angst" && w.angst) wt *= 3;
    return wt;
  });
  let r = Math.random() * weights.reduce((a, b) => a + b, 0);
  for (let i = 0; i < pool.length; i++) { r -= weights[i]; if (r <= 0) return pool[i]; }
  return pool[pool.length - 1];
}

const HEAT_KEY = "qyq_uni_heat";
function heatPref() { const v = localStorage.getItem(HEAT_KEY); return v === "raw" || v === "max" ? v : "veil"; }
function setHeat(v) { localStorage.setItem(HEAT_KEY, v); if (S) S.heat = v; renderStart(); }

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ═══════════ 流程 ═══════════ */

function startGame() {
  if (!P) { showSetup(); return; }
  S = newState();
  S.dark = Math.random() < 0.5 ? DARK_CARDS[Math.floor(Math.random() * DARK_CARDS.length)] : null;
  cardNo = 0;
  const w = pickWorld();
  S.lastCard = { ...w, kind: "大 环 境", kindKey: "world", no: ++cardNo, revealed: false };
  S.phase = "world";
  renderTable();
}

function flipCard() {
  const el = document.getElementById("theCard");
  if (!el || !S.lastCard || S.lastCard.revealed) return;
  el.classList.add("flipped");
  S.lastCard.revealed = true;
  setTimeout(() => {
    renderActions();
    const memo = document.getElementById("memoBox");
    if (memo) memo.style.display = "block";
  }, 950);
}

function enterStory() {
  S.worldTitle = S.lastCard ? S.lastCard.t : "";
  S.worldEra = S.lastCard ? S.lastCard.e : null;
  S.phase = "story";
  S.lastCard = null;
  stage.innerHTML = `<div class="phase-tag">剧 情 行 进 中</div><div id="actionArea"></div>`;
  renderActions();
}

function draw(kind) {
  /* 天意判断：抽满暗定支数后，下一抽自动变成入幕签 */
  if (S.storyDrawn >= S.storyTarget && S.decks.turn.length) {
    const raw = S.decks.turn.pop();
    S.lastCard = { ...raw, kind: "入 幕", kindKey: "turn", no: ++cardNo, revealed: false };
    renderTable();
    return;
  }
  const deck = S.decks[kind];
  if (!deck.length) { toast("这一叠签抽尽了，换一叠试试"); return; }
  const raw = deck.pop();
  S.storyDrawn++;
  S.lastCard = { ...raw, kind: kind === "plot" ? "剧 情" : kind === "char" ? "角 色" : "氛 围", kindKey: kind, no: ++cardNo, revealed: false };
  renderTable();
}

function dealProps() {
  const era = S.worldEra;
  const pool = S.decks.prop.filter(p => (!era || !p.e || p.e === "any" || p.e === era) && (!p.h || S.heat === "max"));
  const n = Math.min(1 + Math.floor(Math.random() * 3), pool.length);   // 天意赐下 1-3 件，按世界适配
  S.propHand = pool.slice(0, n).map(c => ({ ...c, revealed: false, own: null }));
  S.propIdx = 0;
  S.phase = "props";
  renderPropCard();
}

function flipProp() {
  const p = S.propHand[S.propIdx];
  if (p.revealed) return;
  document.getElementById("theCard").classList.add("flipped");
  p.revealed = true;
  const last = S.propIdx >= S.propHand.length - 1;
  setTimeout(() => {
    if (!last) {
      S.propIdx++;
      renderPropCard();    // 下一件带着入场动画滑上来
      return;
    }
    showPropExit();
  }, last ? 1000 : 2800);
}

function showPropExit() {
  const area = document.getElementById("actionArea");
  if (area) area.innerHTML = `
    <div class="own-box">
      <div class="own-title">执 签 判 定</div>
      ${S.propHand.map((p, i) => `
        <div class="own-row"><span class="pname">「${p.t}」</span>
          <button class="chip${p.own === "me" ? " on" : ""}" onclick="setOwn(${i},'me')">${P.her}执签</button>
          <button class="chip${p.own === "him" ? " on" : ""}" onclick="setOwn(${i},'him')">${P.him}执签</button>
          <button class="chip${!p.own ? " on" : ""}" onclick="setOwn(${i},null)">天意自定</button>
        </div>`).join("")}
    </div>
    <div class="btn-row">
      <button class="gold" onclick="copyProps()">📜 递给${P.him}</button>
    </div>
    <div class="note">谁执签、谁领受，抽签人亲判，判完再递<br>递完这一次，签就功成身退 🙈</div>`;
  const memo = document.getElementById("memoBox");
  if (memo) memo.style.display = "block";
}

function setOwn(i, v) { S.propHand[i].own = v; showPropExit(); }

function copyProps() {
  copyText(propsScript(S.propHand), () => {
    toast(`已复制，去粘给${P.him}吧`);
    setTimeout(() => { S.phase = "final"; renderFinal(); }, 1800);
  });
}

function renderFinal() {
  stage.innerHTML = `
    <div class="phase-tag">道 具 已 赐 · 戏 在 帐 中</div>
    <div class="intro">戏演到尽兴处，可以求最后一支「结局签」——<br>让天意替这一局定个收梢；<br>也可以不求，收官全凭你们自己。</div>
    <div class="btn-row">
      <button class="gold" onclick="drawEnding()">求 结 局 签</button>
      <button class="ghost" onclick="finishGame()">不求了 · 就此收官</button>
    </div>`;

function drawEnding() {
  const c = END_CARDS[Math.floor(Math.random() * END_CARDS.length)];
  S.lastCard = { ...c, kind: "结 局", kindKey: "endsign", no: ++cardNo, revealed: false };
  S.phase = "ending";
  renderTable();
}

function finishGame() { S.phase = "end"; renderEnd(); }

function copyScript() {
  const text = scriptFor(S.lastCard);
  if (!text) return;
  copyText(text, () => toast(`已复制，去粘给${P.him}吧`));
}

function copyText(text, onDone) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onDone, () => fallbackCopy(text, onDone));
  } else {
    fallbackCopy(text, onDone);
  }
}

/* file:// 协议下 clipboard API 可能被拒，退回老办法 */
function fallbackCopy(text, onDone) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand("copy"); onDone(); }
  catch { toast("复制失败，长按签文手动复制吧"); }
  document.body.removeChild(ta);
}

const STORE_KEY = "qyq_uni_memos";

function loadMemos() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }

function saveMemo() {
  const ta = document.getElementById("memoText");
  const text = ta.value.trim();
  if (!text) { toast("先写一笔再存呀"); return; }
  const cardLabel = S.phase === "props"

    : (S.lastCard ? `${S.lastCard.kind.replace(/ /g,"")}·${S.lastCard.t}` : "");

  memos.push({
    time: new Date().toLocaleString("zh-CN"),
    card: (S.worldTitle ? `〔${S.worldTitle}〕` : "") + cardLabel,
    text
  });
  localStorage.setItem(STORE_KEY, JSON.stringify(memos));
  ta.value = "";

}

function openArchive() {
  const list = document.getElementById("archiveList");
  const memos = loadMemos();
  list.innerHTML = memos.length
    ? memos.slice().reverse().map(m => `
        <div class="memo-item">
          <div class="meta">${m.time}${m.card ? " · " + m.card : ""}</div>
          <div class="text">${escapeHtml(m.text)}</div>
        </div>`).join("")
    : `<div class="note" style="max-width:none">还没有存过高光时刻<br>抽到好签的时候，记一笔</div>`;
  document.getElementById("archivePanel").style.display = "flex";
}

function closeArchive() {
  document.getElementById("archivePanel").style.display = "none";
}

function clearArchive() {
  if (!loadMemos().length) { toast("卷上本无一字"); return; }
  if (confirm("确定焚稿？所有回忆将付之一炬，不可找回。")) {
    localStorage.removeItem(STORE_KEY);
    openArchive();
    toast("一炬成灰");
  }
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);

/* ═══════════ 金粉浮尘 ═══════════ */

const dustCv = document.getElementById("dust");
const dustCx = dustCv.getContext("2d");
let DW, DH;
const motes = [];
function dustResize() { DW = dustCv.width = innerWidth; DH = dustCv.height = innerHeight; }
addEventListener("resize", dustResize);
dustResize();
for (let i = 0; i < 64; i++) {
  motes.push({
    x: Math.random() * DW, y: Math.random() * DH,
    r: .6 + Math.random() * 1.7,
    s: .08 + Math.random() * .3,
    ph: Math.random() * 6.28,
    a: .12 + Math.random() * .35
  });
}
(function dustTick() {
  dustCx.clearRect(0, 0, DW, DH);
  for (const p of motes) {
    p.y -= p.s;
    p.x += Math.sin(p.ph += .004) * .15;
    if (p.y < -4) { p.y = DH + 4; p.x = Math.random() * DW; }
    const tw = p.a * (.6 + .4 * Math.sin(p.ph * 3));
    dustCx.beginPath();
    dustCx.arc(p.x, p.y, p.r, 0, 6.283);
    dustCx.fillStyle = `rgba(212,175,110,${tw})`;
    dustCx.fill();
  }
  requestAnimationFrame(dustTick);
})();

/* ═══════════ 背景乐（bgm.mp3：自制五声拨弦曲，72s 无缝循环） ═══════════ */

const bgm = document.getElementById("bgm");
bgm.volume = 0.55;
let musicOn = true;

function ensureAudio() {
  if (!musicOn || !bgm.paused) return;
  bgm.play().catch(() => {});   /* 手势没到位就静静等下一次 */
}

function toggleMusic() {
  musicOn = !musicOn;
  const btn = document.getElementById("musicBtn");
  btn.classList.toggle("off", !musicOn);
  if (musicOn) ensureAudio();
  else bgm.pause();
}

/* 浏览器规定必须等用户先动手，才许出声——任意一次点击/触摸就把乐起了 */
document.addEventListener("pointerdown", ensureAudio);
document.addEventListener("touchend", ensureAudio);
document.addEventListener("click", ensureAudio);

/* 页面切走/关闭就把乐停了——不然 iOS 会把它当播客在后台一直放 */
let bgmWasPlaying = false;
function hushBgm() {
  if (!bgm.paused) { bgm.pause(); bgmWasPlaying = true; }
}
document.addEventListener("visibilitychange", () => {
  if (document.hidden) hushBgm();
  else if (bgmWasPlaying && musicOn) { bgm.play().catch(() => {}); bgmWasPlaying = false; }
});
addEventListener("pagehide", hushBgm);

/* ═══════════ 长篇模式：留灯续卷 ═══════════ */

const SAGA_KEY = "qyq_uni_saga";

function loadSaga() {
  try { return JSON.parse(localStorage.getItem(SAGA_KEY)); } catch { return null; }
}

function saveSaga() {
  if (!S || !S.worldTitle) { toast("这一局没有可存的世界"); return; }
  const w = WORLD_CARDS.find(x => x.t === S.worldTitle);
  const highlights = loadMemos().filter(m => m.card && m.card.indexOf("〔" + S.worldTitle + "〕") === 0)
                                .map(m => m.text).slice(-6);
  localStorage.setItem(SAGA_KEY, JSON.stringify({ title: S.worldTitle, world: w, era: S.worldEra, highlights, time: new Date().toLocaleString("zh-CN") }));
  toast("灯留下了，长卷已存 🏮");
}

function continueSaga() {
  const saga = loadSaga();
  if (!saga || !saga.world) { toast("长卷不见了，重新起局吧"); return; }
  S = newState();
  S.dark = Math.random() < 0.5 ? DARK_CARDS[Math.floor(Math.random() * DARK_CARDS.length)] : null;
  S.saga = saga;
  cardNo = 0;
  S.lastCard = { ...saga.world, kind: "大 环 境", kindKey: "world", no: ++cardNo, revealed: false };
  S.phase = "world";
  renderTable();
  toast("续上前卷 ·〔" + saga.title + "〕🏮");
}

/* ═══════════ 断线续局：牌局常驻 localStorage，手机切走刷新也丢不了 ═══════════ */

const SESSION_KEY = "qyq_uni_session";

function saveState() {
  if (!S || S.phase === "start" || S.phase === "end") { localStorage.removeItem(SESSION_KEY); return; }
  try { localStorage.setItem(SESSION_KEY, JSON.stringify({ S: S, cardNo: cardNo })); } catch {}
}
setInterval(saveState, 1500);
addEventListener("pagehide", saveState);

function restoreState() {
  try {
    const d = JSON.parse(localStorage.getItem(SESSION_KEY));
    if (!d || !d.S || d.S.phase === "start" || d.S.phase === "end") return false;
    S = d.S; cardNo = d.cardNo || 0;
    if (!S.decks.char) S.decks.char = shuffle([...CHAR_CARDS]);
    if (S.phase === "props") renderPropCard();
    else if (S.phase === "final") renderFinal();
    else if (S.lastCard) renderTable();
    else {
      stage.innerHTML = `<div class="phase-tag">剧 情 行 进 中</div><div id="actionArea"></div>`;
      renderActions();
    }
    setTimeout(() => toast("已续上未完的局 🎴"), 700);
    return true;
  } catch { return false; }
}

function abandonGame() {
  if (!confirm("确定弃局？这一局的进度会清空（存过的回忆不受影响）。")) return;
  localStorage.removeItem(SESSION_KEY);
  S = newState(); cardNo = 0;
  renderStart();
}

if (!restoreState()) renderStart();
</script>
</body>
